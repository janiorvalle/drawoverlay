name: Version PR

# Changesets bookkeeping: when main carries pending changesets, this opens
# (or refreshes) a "chore: release" PR that bumps the version and writes the
# changelog. Publishing stays on the tag-triggered release workflow behind
# the protected environment — merging the version PR never publishes.

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: version-pr
  cancel-in-progress: true

jobs:
  version-pr:
    name: Open or update the version PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository == 'janiorvalle/drawoverlay'
    permissions:
      contents: write # the changesets action pushes the version branch
      pull-requests: write # ...and opens the version PR
    steps:
      # The changesets action pushes the version branch with the persisted
      # checkout credentials, hence no persist-credentials: false.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      # pnpm install wires the repo's gitleaks pre-commit hook; the runner
      # has no gitleaks and CI runs its own secret scan, so unhook the
      # commits the changesets action makes.
      - run: git config --unset core.hooksPath
      - name: Create or update the version PR
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          title: "chore: release"
          commit: "chore: release"
        env:
          GITHUB_TOKEN: ${{ github.token }}
