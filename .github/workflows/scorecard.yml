name: Scorecard

# OpenSSF Scorecard grades the repo's supply-chain posture continuously.
# It only works on public repos; runs fail harmlessly until the flip.

on:
  push:
    branches:
      - main
  schedule:
    - cron: "24 6 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'janiorvalle/drawover'
    permissions:
      contents: read
      # Required to upload SARIF to code scanning and publish results.
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
