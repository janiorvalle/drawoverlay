name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup
      - name: Confirm tokenless trusted publishing
        run: test -z "${NODE_AUTH_TOKEN:-}" && test -z "${NPM_TOKEN:-}"
      - run: npm install --global npm@11.13.0
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm verify
      - name: Publish with trusted provenance
        working-directory: packages/drawover
        run: npm publish --access public --provenance
